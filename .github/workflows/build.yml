name: Build FlipperDroid APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK manually
        shell: bash
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          rm cmdline-tools.zip
          mv cmdline-tools latest 2>/dev/null || true
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
          
          yes | sdkmanager --licenses 2>&1 || true
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1" 2>&1
          
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/27.0.12077973" >> local.properties

      - name: Setup Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.11.1 2>&1 || true
          chmod +x gradlew

      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 || ./gradlew assembleDebug --no-daemon --stacktrace --no-build-cache 2>&1
          echo "=== Looking for APK ==="
          find . -path "*/outputs/apk/*" -name "*.apk" 2>/dev/null
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: FlipperDroid-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn