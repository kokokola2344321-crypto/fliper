name: Build FlipperDroid APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          path: FlipperDroid

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3.5.0

      - name: Setup Android SDK
        shell: bash
        run: |
          # Download cmdline-tools
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -L -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          rm cmdline-tools.zip
          mv cmdline-tools latest
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          
          # Accept licenses
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 || true
          
          # Install required packages
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1" 2>&1

      - name: Build APK
        shell: bash
        env:
          ANDROID_SDK_ROOT: $HOME/android-sdk
          ANDROID_HOME: $HOME/android-sdk
        working-directory: FlipperDroid
        run: |
          # Create local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/27.0.12077973" >> local.properties
          
          # Generate gradle wrapper
          android_sdk=$ANDROID_HOME gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew
          
          # Build
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 || true
          
          echo "=== BUILD COMPLETE ==="
          find . -name "*.apk" -type f 2>/dev/null
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: FlipperDroid-APK
          path: FlipperDroid/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error