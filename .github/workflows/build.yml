name: Build FlipperDroid APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 10406996

      - name: Accept licenses
        run: yes | sdkmanager --licenses 2>&1 || true

      - name: Install required SDK components
        run: |
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1" 2>&1 || true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/27.0.12077973" >> local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew 2>/dev/null || true

      - name: Build Debug APK
        run: |
          gradle wrapper --gradle-version 8.11.1 2>&1 || true
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          else
            # fallback: use system gradle
            export ANDROID_HOME=/usr/local/lib/android/sdk
            gradle assembleDebug --no-daemon --stacktrace 2>&1 || true
          fi

      - name: Find APK
        run: |
          find . -name "*.apk" -type f
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK found"
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlipperDroid-Debug-APK
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: warn